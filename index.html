<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إهداء خاص لـ ميار</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #2d0515; font-family: 'Segoe UI', sans-serif; }
        #rotate-device { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #2d0515; color: #ffb7c5; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; text-align: center; padding: 20px; box-sizing: border-box; }
        @media (orientation: landscape) { #rotate-device { display: none; } }
        #start-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #5e0b2b, #2d0515); display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; transition: 1s; }
        .heart { font-size: 80px; cursor: pointer; animation: pulse 1.5s infinite; filter: drop-shadow(0 0 10px #ffb7c5); }
        #main-wrapper { display: none; width: 100%; height: 100%; position: relative; overflow: hidden; }
        .bg-img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; opacity: 0.4; background: url('https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=1350&q=80'); }
        .content-overlay { position: absolute; bottom: 15%; width: 100%; text-align: center; color: white; z-index: 10; padding: 20px; box-sizing: border-box; }
        .card { background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(10px); padding: 25px; border-radius: 25px; display: inline-block; max-width: 85%; border: 1px solid rgba(255,183,197,0.3); }
        h1 { color: #ffb7c5; margin-bottom: 10px; font-size: 1.8rem; }
        p { font-size: 1.2rem; line-height: 1.6; }
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.2); } 100% { transform: scale(1); } }
        .sakura { position: absolute; background: #ffb7c5; border-radius: 100% 0 100% 0; opacity: 0.7; pointer-events: none; animation: fall linear infinite; }
        @keyframes fall { 0% { transform: translateY(-10vh) rotate(0); } 100% { transform: translateY(110vh) rotate(360deg); } }
    </style>
</head>
<body>
    <div id="rotate-device"><div style="font-size: 50px;">📱🔄</div><h2>دوري الموبايل بالعرض يا ميار</h2><p>حتى تفتح المفاجأة</p></div>
    <div id="start-screen"><div class="heart" onclick="initExperience()">❤️</div><h2 style="color: #ffb7c5; margin-top: 20px;">أنتِ ميار؟</h2><p style="color: white;">اضغطي على القلب</p></div>
    <div id="main-wrapper">
        <div class="bg-img"></div>
        <audio id="bgMusic" loop><source src="موسيقى.mp3" type="audio/mpeg"></audio>
        <div class="content-overlay">
            <div class="card">
                <h1>كل عام وإنتِ العيد يا ميار 🌸</h1>
                <p>يا ربي أيامچ كلها ربيع وأفراح، ووجهچ دوم يضحك وما تفارگه السعادة. <br>أحبچ يا أحلى ميار ❤️</p>
            </div>
        </div>
    </div>
    <script>
        function initExperience() {
            var audio = document.getElementById('bgMusic');
            audio.play().catch(function(error) { console.log("خطأ في تشغيل الصوت"); });
            document.getElementById('start-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('start-screen').style.display = 'none';
                document.getElementById('main-wrapper').style.display = 'block';
                setInterval(createSakura, 200);
            }, 1000);
        }
        function createSakura() {
            const leaf = document.createElement('div');
            leaf.classList.add('sakura');
            const size = Math.random() * 10 + 10 + 'px';
            leaf.style.width = size; leaf.style.height = size;
            leaf.style.left = Math.random() * 100 + 'vw';
            leaf.style.animationDuration = Math.random() * 3 + 4 + 's';
            document.body.appendChild(leaf);
            setTimeout(() => leaf.remove(), 5000);
        }
    </script>
</body>
</html>
